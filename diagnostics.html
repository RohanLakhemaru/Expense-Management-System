<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Diagnostics - Pinnacle Expense Manager</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
        .test-result { padding: 1rem; border-radius: 0.5rem; margin: 0.5rem 0; }
        .test-pass { background-color: #dcfce7; border: 1px solid #86efac; color: #166534; }
        .test-fail { background-color: #fee2e2; border: 1px solid #fca5a5; color: #991b1b; }
        .test-warn { background-color: #fef3c7; border: 1px solid #fcd34d; color: #92400e; }
        .test-wait { background-color: #e0e7ff; border: 1px solid #a5b4fc; color: #3730a3; }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-lg p-8">
        <h1 class="text-3xl font-bold mb-2">🔍 System Diagnostics</h1>
        <p class="text-slate-500 mb-6">Checking Pinnacle Expense Manager system status...</p>
        
        <div id="tests"></div>
        
        <div class="mt-8 pt-6 border-t border-slate-200">
            <h3 class="font-bold mb-3">Quick Actions:</h3>
            <button onclick="testBackend()" class="mr-2 bg-blue-600 text-white px-4 py-2 rounded hover:bg-blue-700">
                Test Backend API
            </button>
            <button onclick="location.href='index.html'" class="mr-2 bg-slate-600 text-white px-4 py-2 rounded hover:bg-slate-700">
                Try Loading App
            </button>
            <button onclick="clearConsole(); location.reload();" class="bg-slate-600 text-white px-4 py-2 rounded hover:bg-slate-700">
                Reload Page
            </button>
        </div>
    </div>

    <script>
        function addTest(name, status, message = '') {
            const tests = document.getElementById('tests');
            const testEl = document.createElement('div');
            testEl.className = `test-result test-${status}`;
            let icon = status === 'pass' ? '✅' : status === 'fail' ? '❌' : status === 'warn' ? '⚠️' : '⏳';
            testEl.innerHTML = `
                <div class="font-bold">${icon} ${name}</div>
                ${message ? `<div class="text-sm mt-1">${message}</div>` : ''}
            `;
            tests.appendChild(testEl);
        }

        async function testBackend() {
            addTest('Backend Test', 'wait', 'Testing API endpoint...');
            try {
                const response = await fetch('http://localhost/NewManagementSystem/Expense-Management-System/index.php?action=test', {
                    credentials: 'include'
                });
                const text = await response.text();
                if (response.ok || response.status === 400 || response.status === 401) {
                    addTest('Backend API Response', 'pass', `Status ${response.status}: Server responded successfully`);
                } else {
                    addTest('Backend API Response', 'fail', `Status ${response.status}: ${text.substring(0, 100)}`);
                }
            } catch (error) {
                addTest('Backend API Response', 'fail', `Network error: ${error.message}`);
            }
        }

        // Run tests on page load
        window.addEventListener('load', () => {
            // 1. Check React
            addTest('React Module', 'wait', 'Loading React from esm.sh...');
            import('react').then(() => {
                addTest('React Module', 'pass', 'React v19 loaded successfully');
            }).catch((err) => {
                addTest('React Module', 'fail', `Failed to load: ${err.message}`);
            });

            // 2. Check React DOM
            addTest('React DOM', 'wait', 'Loading React DOM from esm.sh...');
            import('react-dom/client').then(() => {
                addTest('React DOM', 'pass', 'React DOM loaded successfully');
            }).catch((err) => {
                addTest('React DOM', 'fail', `Failed to load: ${err.message}`);
            });

            // 3. Check Backend
            addTest('Backend Connectivity', 'wait', 'Testing MySQL connection...');
            testBackendConnection();

            // 4. Check LocalStorage
            try {
                localStorage.setItem('test', 'test');
                localStorage.removeItem('test');
                addTest('LocalStorage', 'pass', 'LocalStorage is available');
            } catch {
                addTest('LocalStorage', 'warn', 'LocalStorage is unavailable (may affect caching)');
            }

            // 5. Check Fetch API
            if (window.fetch) {
                addTest('Fetch API', 'pass', 'Fetch API is available');
            } else {
                addTest('Fetch API', 'fail', 'Fetch API not available');
            }

            // 6. Check Browser Compatibility
            const browser = getBrowserInfo();
            addTest('Browser', browser.match ? 'pass' : 'warn', `${browser.name}`);

            // 7. Check Network
            if (navigator.onLine) {
                addTest('Network Status', 'pass', 'Device is online');
            } else {
                addTest('Network Status', 'fail', 'Device appears to be offline');
            }
        });

        function testBackendConnection() {
            fetch('http://localhost/NewManagementSystem/Expense-Management-System/index.php?action=currentUser', {
                credentials: 'include'
            }).then(response => {
                if (response.status === 401 || response.status === 404) {
                    addTest('Backend Connectivity', 'pass', 'Backend server is responding (MySQL initialized)');
                } else if (response.ok) {
                    addTest('Backend Connectivity', 'pass', 'Backend server is responding');
                } else {
                    addTest('Backend Connectivity', 'warn', `Server responding with status ${response.status}`);
                }
            }).catch(error => {
                addTest('Backend Connectivity', 'fail', `Backend unreachable: ${error.message}`);
                addTest('Possible Causes', 'warn', 'Check if: 1) XAMPP is running, 2) MySQL is started, 3) PHP is enabled');
            });
        }

        function getBrowserInfo() {
            const ua = navigator.userAgent;
            let match;
            if ((match = ua.match(/Chrome\/(\d+)/))) return { name: `Chrome ${match[1]}`, match: true };
            if ((match = ua.match(/Firefox\/(\d+)/))) return { name: `Firefox ${match[1]}`, match: true };
            if ((match = ua.match(/Safari\/(\d+)/))) return { name: `Safari ${match[1]}`, match: true };
            if ((match = ua.match(/Edge\/(\d+)/))) return { name: `Edge ${match[1]}`, match: true };
            return { name: `${ua.substring(0, 50)}...`, match: false };
        }

        function clearConsole() {
            console.clear();
            console.log('📊 Console cleared. Reloading...');
        }
    </script>
</body>
</html>
